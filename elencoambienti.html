<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Cronologia Ambienti - Dungeon Tales</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .cronologia-item {
            border-bottom: 2px double #5d4037;
            padding: 20px 0;
            margin-bottom: 20px;
        }
        .meta-info {
            font-size: 0.9rem;
            color: #5d4037;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #d2b48c;
        }
        .btn-cancella {
            background: #b71c1c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Almendra', serif;
            font-size: 0.8rem;
        }
        .vuoto-msg {
            text-align: center;
            font-style: italic;
            margin-top: 50px;
            color: #5d4037;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <p class="tithead">Cronologia Esplorazione</p>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="dungeon-btn" onclick="svuotaCronologia()">Svuota Archivio</button>
        </div>

        <div id="cronologia-lista">
            </div>
    </div>

    <script>
        // Funzione per caricare e mostrare la cronologia
        function caricaCronologia() {
            const listaDiv = document.getElementById('cronologia-lista');
            const dati = JSON.parse(localStorage.getItem('dungeon_history') || "[]");

            if (dati.length === 0) {
                listaDiv.innerHTML = '<p class="vuoto-msg">Il tuo diario di viaggio è ancora vuoto...</p>';
                return;
            }

            listaDiv.innerHTML = dati.map((item, index) => `
                <div class="cronologia-item" id="item-${index}">
                    <div class="meta-info">
                        <span>📍 ${item.tipo}</span>
                        <span>📅 ${item.orario}</span>
                    </div>
                    <div class="content-snapshot">
                        ${item.testo}
                    </div>
                </div>
            `).join('');
        }

        function svuotaCronologia() {
            if (confirm("Sei sicuro di voler cancellare tutti gli ambienti salvati?")) {
                localStorage.removeItem('dungeon_history');
                caricaCronologia();
            }
        }

        // Avvio al caricamento
        window.onload = caricaCronologia;
    </script>
</body>
</html>
